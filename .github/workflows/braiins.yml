name: Braiins Pool Monitor

on:
  schedule:
    # Run every hour (optimized for free tier)
    - cron: "0 * * * *"

  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: braiins-monitor
  cancel-in-progress: true

jobs:
  monitor:
    runs-on: ubuntu-latest

    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt


      - name: Run Braiins Monitor
        env:
          BRAIINS_API_URL: ${{ secrets.BRAIINS_API_URL }}
          BRAIINS_API_TOKEN: ${{ secrets.BRAIINS_API_TOKEN }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          POOL_NAME: "Braiins Pool"
        run: python run.py

      - name: Commit state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/state.json data/incidents.json data/report_state.json

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Update monitoring state [skip ci]"
          git push origin HEAD:main