name: Braiins Pool Monitor

on:
  schedule:
     # Run every 30 minutes to stay within free GitHub Actions quota
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run Braiins Monitor
        env:
          BRAIINS_API_URL: ${{ secrets.BRAIINS_API_URL }}
          BRAIINS_API_TOKEN: ${{ secrets.BRAIINS_API_TOKEN }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python monitor_braiins.py
